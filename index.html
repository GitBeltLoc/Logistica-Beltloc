<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logística Semanal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-header">
    <div class="header-left">
      <h1>Logística Semanal</h1>
      <span class="sub" id="statusLine">Carregando...</span>
    </div>
    <div class="header-center">
      <span id="countdown" class="countdown">🔄 Próxima atualização: 5:00</span>
    </div>
    <div class="header-right">
      <input class="input" id="q" type="text" placeholder="🔍 Buscar cliente, cidade, equipamento..." />
    </div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <template id="tpl-column">
    <div class="col">
      <div class="col-header">
        <span class="col-title"></span>
        <span class="col-count">0</span>
      </div>
      <div class="col-body"></div>
    </div>
  </template>

  <template id="tpl-card">
    <div class="card">
      <div class="card-top">
        <div class="labels"></div>
        <div class="status-dot"></div>
      </div>
      <div class="card-title"></div>
      <div class="card-desc"></div>
      <div class="card-bottom">
        <span class="chip chip-date" hidden></span>
        <div class="avatars"></div>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
